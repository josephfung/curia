name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # TODO: Uncomment when package.json exists
      # - name: Install dependencies
      #   run: pnpm install --frozen-lockfile

      # - name: Lint
      #   run: pnpm run lint

      # - name: Type check
      #   run: pnpm run typecheck

      # - name: Run tests
      #   run: pnpm test

      - name: Verify project structure
        run: |
          test -f README.md
          test -f docs/specs/00-overview.md
          test -d agents
          test -d skills
          test -d config
          echo "Project structure verified"
