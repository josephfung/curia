# Channel trust and unknown sender policies.
# trust: determines max sensitivity of actions via this channel
# unknown_sender: what to do when a message arrives from an unrecognized sender
#   allow - process normally (CLI is always the CEO)
#   hold_and_notify - hold the message silently, notify CEO
#   reject - silently drop the message

channels:
  cli:
    trust: high
    unknown_sender: allow
  # 'web' is the KG web app (authenticated via the bootstrap secret, which is CEO-only).
  # contact-resolver.ts short-circuits this channel to the CEO contact, so unknown_sender
  # is defence-in-depth only. Trust is 'high' because the bootstrap secret is equivalent
  # to the CEO's CLI session — same principal, same authority.
  web:
    trust: high
    unknown_sender: allow
  signal:
    trust: high
    unknown_sender: hold_and_notify
  telegram:
    trust: medium
    unknown_sender: hold_and_notify
  http:
    trust: medium
    unknown_sender: reject
  email:
    trust: low
    unknown_sender: hold_and_notify
