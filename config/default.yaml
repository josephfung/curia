channels:
  cli:
    enabled: true
  # Signal channel activation is controlled by env vars, not this file.
  # Set SIGNAL_SOCKET_PATH + SIGNAL_PHONE_NUMBER at runtime to enable the Signal adapter.
  # Trust level and unknown-sender policy live in config/channel-trust.yaml.

browser:
  # How long a browser session stays alive after its last action (ms).
  sessionTtlMs: 600000   # 10 minutes
  # How often the session sweep runs to close expired sessions (ms).
  sweepIntervalMs: 120000  # 2 minutes

agents:
  coordinator:
    config_path: agents/coordinator.yaml

dispatch:
  # Milliseconds of inactivity after the last agent response before a conversation.checkpoint
  # event fires and background memory extraction (extract-relationships, etc.) runs.
  conversationCheckpointDebounceMs: 600000   # 10 minutes

workingMemory:
  # Rolling context summarization (spec §01-memory-system.md).
  # When the active turn count for a conversation exceeds `threshold`, the oldest
  # (count - keepWindow) turns are condensed into a synthetic summary turn via an
  # LLM call and archived. Active context assembly sees the summary instead of the
  # archived originals, preventing silent context-window overflow on long tasks.
  #
  # Summarization is best-effort — a failed LLM call is logged at error level and
  # skipped; the turn is still written and the next add() will retry automatically.
  #
  # Constraints: threshold must be >= 2, keepWindow must be >= 1, keepWindow < threshold.
  summarization:
    threshold: 20   # turns that trigger a summarization pass
    keepWindow: 10  # most-recent turns to retain as active after summarization

skillOutput:
  # Maximum character length of a sanitized skill result before truncation.
  # Skills that return more than this (search results, page crawls, long calendar
  # lists) will have their output clipped and a truncation note appended.
  # Raise this if you routinely hit the limit on large-payload skills; lower it
  # to reduce LLM context pressure on installations with many concurrent agents.
  maxLength: 200000  # 200k characters (~50k tokens at 4 chars/token)

security:
  # Layer 1 prompt injection detection (spec §06-audit-and-security.md).
  #
  # Additional regex patterns to check beyond the built-in defaults.
  # Built-in defaults cover: "ignore previous instructions", "ignore all prior
  # instructions", "you are now", "system:", "[system]", "act as", "disregard your".
  #
  # Each entry must have:
  #   regex  — a valid JavaScript regex string (case-insensitive matching is applied automatically)
  #   label  — human-readable name that appears in audit log findings
  #
  # Example:
  #   extra_injection_patterns:
  #     - regex: "forget everything above"
  #       label: "forget everything above"
  #     - regex: "new\\s+persona"
  #       label: "new persona"
  #
  # Changes take effect on restart — no code changes required.
  #
  # ⚠️  ReDoS warning: avoid patterns with unbounded nested quantifiers such as
  # (a+)+ or (.+)+ — these can cause catastrophic backtracking on adversarial input
  # and may freeze the Node.js event loop. Prefer simple bounded patterns (e.g.
  # "forget\s+everything" rather than "(forget.+)+"). These patterns run in the
  # main process on every inbound message, so keep them efficient.
  extra_injection_patterns: []
