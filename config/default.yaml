channels:
  cli:
    enabled: true
  max_message_bytes: 102400   # 100KB — inbound messages exceeding this are rejected before routing
  # Signal channel activation is controlled by env vars, not this file.
  # Set SIGNAL_SOCKET_PATH + SIGNAL_PHONE_NUMBER at runtime to enable the Signal adapter.
  # Trust level and unknown-sender policy live in config/channel-trust.yaml.

browser:
  # How long a browser session stays alive after its last action (ms).
  sessionTtlMs: 600000   # 10 minutes
  # How often the session sweep runs to close expired sessions (ms).
  sweepIntervalMs: 120000  # 2 minutes

agents:
  coordinator:
    config_path: agents/coordinator.yaml

dispatch:
  # Milliseconds of inactivity after the last agent response before a conversation.checkpoint
  # event fires and background memory extraction (extract-relationships, etc.) runs.
  conversationCheckpointDebounceMs: 600000   # 10 minutes

  # In-memory rate limiting for the dispatch layer (spec §06-audit-and-security.md).
  # Protects against message flooding from malfunctioning channels, abusive senders,
  # or compromised integrations. Two independent limits are enforced:
  #
  #   global     — total messages per window across all senders; enforced before any
  #                policy-gate processing (guards against aggregate DoS flooding).
  #   per-sender — messages per sender per window; enforced after policy gates
  #                (blocked/held senders are already dropped before this check).
  #
  # Excess messages are dropped silently — no response is sent to the sender.
  # Violations are audit-logged as message.rejected events with reason
  # 'global_rate_limited' or 'sender_rate_limited', and logged at warn level.
  #
  # Changes take effect on restart.
  rate_limit:
    window_ms: 60000        # 1-minute fixed window
    max_per_sender: 15      # messages per sender per window (15 allows for an active chat burst)
    max_global: 100         # total messages per window across all senders

workingMemory:
  # Rolling context summarization (spec §01-memory-system.md).
  # When the active turn count for a conversation exceeds `threshold`, the oldest
  # (count - keepWindow) turns are condensed into a synthetic summary turn via an
  # LLM call and archived. Active context assembly sees the summary instead of the
  # archived originals, preventing silent context-window overflow on long tasks.
  #
  # Summarization is best-effort — a failed LLM call is logged at error level and
  # skipped; the turn is still written and the next add() will retry automatically.
  #
  # Constraints: threshold must be >= 2, keepWindow must be >= 1, keepWindow < threshold.
  summarization:
    threshold: 20   # turns that trigger a summarization pass
    keepWindow: 10  # most-recent turns to retain as active after summarization

skillOutput:
  # Maximum character length of a sanitized skill result before truncation.
  # Skills that return more than this (search results, page crawls, long calendar
  # lists) will have their output clipped and a truncation note appended.
  # Raise this if you routinely hit the limit on large-payload skills; lower it
  # to reduce LLM context pressure on installations with many concurrent agents.
  maxLength: 200000  # 200k characters (~50k tokens at 4 chars/token)

security:
  # Layer 1 prompt injection detection (spec §06-audit-and-security.md).
  #
  # Additional regex patterns to check beyond the built-in defaults.
  # Built-in defaults cover: "ignore previous instructions", "ignore all prior
  # instructions", "you are now", "system:", "[system]", "act as", "disregard your".
  #
  # Each entry must have:
  #   regex  — a valid JavaScript regex string (case-insensitive matching is applied automatically)
  #   label  — human-readable name that appears in audit log findings
  #
  # Example:
  #   extra_injection_patterns:
  #     - regex: "forget everything above"
  #       label: "forget everything above"
  #     - regex: "new\\s+persona"
  #       label: "new persona"
  #
  # Changes take effect on restart — no code changes required.
  #
  # ⚠️  ReDoS warning: avoid patterns with unbounded nested quantifiers such as
  # (a+)+ or (.+)+ — these can cause catastrophic backtracking on adversarial input
  # and may freeze the Node.js event loop. Prefer simple bounded patterns (e.g.
  # "forget\s+everything" rather than "(forget.+)+"). These patterns run in the
  # main process on every inbound message, so keep them efficient.
  extra_injection_patterns: []

  # Message trust score computation weights (spec §06-audit-and-security.md).
  # messageTrustScore = (channelWeight × channelNormalized) + (contactWeight × contactConfidence)
  #                     − (maxRiskPenalty × injectionRiskScore), clamped to [0.0, 1.0]
  #
  # Channel trust normalized weights: high=1.0, medium=0.6, low=0.3
  trust_score:
    channel_weight: 0.4
    contact_weight: 0.4
    max_risk_penalty: 0.2

  # Minimum trust score floor — messages scoring below this threshold trigger
  # hold_and_notify routing regardless of the per-channel unknown_sender policy,
  # unless the channel is configured as 'ignore'.
  trust_score_floor: 0.2

pii:
  # Extra PII patterns to scrub from LLM-facing error strings, beyond the built-in
  # defaults (spec §06-audit-and-security.md — PII Handling).
  #
  # Built-in defaults (sourced from @openredaction/openredaction):
  #   - Email addresses       → [EMAIL]
  #   - US-format phone numbers (also matches CA)   → [PHONE]
  #   - UK phone numbers      → [PHONE]
  #   - Credit card numbers   → [CREDIT_CARD]
  #   - US SSNs (keyword-prefixed, e.g. "SSN: 123-45-6789") → [SSN]
  #
  # Add custom patterns here for any PII types specific to your deployment
  # (employee IDs, account numbers, national IDs, etc.).
  #
  # Each entry must have:
  #   regex       — a valid JavaScript regex string (gi flags applied automatically)
  #   replacement — the placeholder to substitute, e.g. "[EMPLOYEE_ID]"
  #
  # Example:
  #   extra_patterns:
  #     - regex: "EMP-\\d{6}"
  #       replacement: "[EMPLOYEE_ID]"
  #     - regex: "\\b\\d{3}[-\\s]?\\d{3}[-\\s]?\\d{3}\\b"
  #       replacement: "[CA_SIN]"
  #
  # Changes take effect on restart — no code changes required.
  #
  # ⚠️  ReDoS warning: avoid patterns with unbounded nested quantifiers such as
  # (a+)+ or (.+)+ — these can cause catastrophic backtracking on adversarial input.
  # These patterns run on every LLM-facing error message.
  extra_patterns: []

# Trust-gated action thresholds (spec §06-audit-and-security.md).
# The Coordinator checks messageTrustScore against these thresholds before
# taking actions on behalf of a sender. Enforced via the Coordinator's system prompt.
trust_policy:
  financial_actions: 0.8
  data_export: 0.8
  scheduling: 0.5
  information_queries: 0.2
