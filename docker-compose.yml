services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # pgAudit init script runs on first database creation only
      - ./docker/postgres-init-pgaudit.sql:/docker-entrypoint-initdb.d/10-pgaudit.sql:ro
    environment:
      POSTGRES_DB: curia
      POSTGRES_USER: ${DB_USER:-your-db-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your-db-password}
    # Load pgAudit and configure session-level auditing via command args.
    # All pgAudit settings are here (not in the init script) so there's one
    # place to look. The init script only handles CREATE EXTENSION and role setup.
    # IMPORTANT: shared_preload_libraries is the critical line — without it, the
    # other pgaudit.* settings are silently accepted but have no effect.
    command: >
      postgres
      -c shared_preload_libraries=pgaudit
      -c pgaudit.log=write,ddl
      -c pgaudit.log_parameter=on
      -c pgaudit.log_relation=on
      -c pgaudit.role=pgaudit_role
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-curia}"]
      interval: 5s
      timeout: 5s
      retries: 5

  curia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curia
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3000}:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      # Persist OAuth token cache for the google-workspace MCP server.
      # Tokens are written here on first OAuth login and auto-refreshed thereafter.
      # Without this volume, re-authentication is required on every container restart.
      # See docs/dev/google-drive.md for first-time OAuth setup.
      - google_workspace_tokens:/root/.google_workspace_mcp

volumes:
  pgdata:
  google_workspace_tokens:
